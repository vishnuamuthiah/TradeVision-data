name: Weekly market data

# Scrapes Nasdaq earnings + dividend calendars and republishes the on-device data
# file as a stable Release asset. The app fetches:
#   https://github.com/vishnuamuthiah/TradeVision-data/releases/download/data-latest/market_data.json
#
# A failed run (Nasdaq blocked us / schema changed -> scraper exits non-zero) emails
# the repo owner by default — that's the "notify me if the endpoint breaks" signal.

on:
  schedule:
    - cron: "0 8 * * 1"   # Mondays 08:00 UTC
  workflow_dispatch: {}    # manual trigger (use this for the first validation run)

permissions:
  contents: write          # needed to publish the Release

concurrency:
  group: weekly-market-data
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scrape market data
        env:
          DAYS_BACK: "400"
          DAYS_FORWARD: "100"
          REQUEST_DELAY: "0.8"
          OUT_PATH: "data/market_data.json"
        run: python scraper/build_market_data.py

      - name: Publish as Release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Recreate a fixed tag so the download URL stays stable week to week.
          gh release delete data-latest --yes --cleanup-tag || true
          gh release create data-latest data/market_data.json \
            --title "Market data (latest)" \
            --notes "Auto-generated $(date -u '+%Y-%m-%d %H:%M UTC')"
