name: Earnings data

# Nasdaq earnings calendar -> earnings.json, published as its own Release asset.
# Independent of the dividend workflow (runs in parallel, fails in isolation).
# App fetches:
#   https://github.com/vishnuamuthiah/TradeVision-data/releases/download/earnings-latest/earnings.json

on:
  schedule:
    - cron: "0 8 * * 1"   # Mondays 08:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: earnings-data
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scrape earnings
        env:
          DAYS_BACK: "400"
          DAYS_FORWARD: "100"
          REQUEST_DELAY: "0.8"
          OUT_PATH: "data/earnings.json"
        run: python scraper/build_earnings.py

      - name: Publish as Release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete earnings-latest --yes --cleanup-tag || true
          gh release create earnings-latest data/earnings.json \
            --title "Earnings data (latest)" \
            --notes "Auto-generated $(date -u '+%Y-%m-%d %H:%M UTC')"
